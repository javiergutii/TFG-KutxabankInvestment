services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  extractor:
    build:
      context: ./services/extractor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db
    environment:

      # MySQL
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass

      # Metadata / app config
      EMPRESA: "Caixa"
      VIDEO_TITLE: "Conference demo"
      TARGET_URL: "https://edge.media-server.com/mmc/p/ev33c56y/"
      FECHA: "2026-02-03 10:00"

      # Datos del formulario de registro
      FORM_FIRST_NAME: "Javier"
      FORM_LAST_NAME: "Gutiérrez"
      FORM_EMAIL: "javier.g@opendeusto.es"
      FORM_COMPANY: "Empresa A"
      FORM_COUNTRY_TEXT: "sp"
      FORM_OCCUPATION_TEXT: "o"

      # Configuración del processor
      CHUNK_SIZE: "200"
      CHUNK_OVERLAP: "100"
      EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
      FAISS_INDEX_DIR: "/app/shared/faiss_index"
      FAISS_INDEX_FILE: "index.faiss"
      FAISS_METADATA_FILE: "metadata.pkl"

      # Groq
      GROQ_API_KEY: ${GROQ_API_KEY}                 # 🔑 leer del .env, no hardcodear
      GROQ_MODEL: "moonshotai/kimi-k2-instruct" #llama-3.3-70b-versatile
      GROQ_MAX_TOKENS: "2000"

      # Proxy
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,db"

    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/extractor/src:/app/src
      - ./data:/data
      - ./artifacts:/app/artifacts
      - ./outputs:/app/outputs
      - ./shared:/app/shared
      - ./exports:/app/exports
    profiles:
      - manual
    command: ["python", "-m", "main"]

  processor:
    build:
      context: ./services/processor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db
    environment:
      # Proxy
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,db"
      # MySQL
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass
      # Procesamiento
      BATCH_SIZE: "10"
      CHUNK_SIZE: "200"
      CHUNK_OVERLAP: "100"
      PROCESSING_INTERVAL: "30"
      # Embeddings
      EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
      # FAISS
      FAISS_INDEX_DIR: "/app/shared/faiss_index"
      FAISS_INDEX_FILE: "index.faiss"
      FAISS_METADATA_FILE: "metadata.pkl"
      # Groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: "moonshotai/kimi-k2-instruct"
      GROQ_MAX_TOKENS: "2000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/processor/src:/app/
      - ./shared:/app/shared
      - ./exports:/app/exports
    restart: unless-stopped
    command: ["python", "-u", "main.py"]

volumes:
  mysqldata:
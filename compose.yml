services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Después de iniciar, descarga el modelo automáticamente
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        sleep 5
        ollama pull llama3.2:3b
        wait

  extractor:
    build:
      context: ./services/extractor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db

    environment:
      # MySQL
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass

      # Metadata / app config
      COMPANY_NAME: "empresa A"
      VIDEO_TITLE: "Conference demo"
      VIDEO_URL: ""
      VIDEO_DATE: "2026-02-03 10:00"
      
      # 🆕 Configuración del processor (para ejecutarlo integrado)
      CHUNK_SIZE: "500"
      CHUNK_OVERLAP: "50"
      EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
      FAISS_INDEX_DIR: "/app/shared/faiss_index"
      FAISS_INDEX_FILE: "index.faiss"
      FAISS_METADATA_FILE: "metadata.pkl"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "llama3.2:3b"
      OLLAMA_TIMEOUT: "120"

    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

    volumes:
      - ./services/extractor/src:/app/src
      - ./data:/data
      - ./artifacts:/app/artifacts
      - ./outputs:/app/outputs
      # 🆕 Montar código del processor para ejecutarlo desde extractor
      - ./services/processor:/app/processor_code:ro
      - ./shared:/app/shared

    command: ["python", "-m", "main"]

  processor:
    build:
      context: ./services/processor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db,ollama

    environment:
      # MySQL
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass

      # Procesamiento
      BATCH_SIZE: "10"
      
      # Chunks
      CHUNK_SIZE: "500"
      CHUNK_OVERLAP: "50"

      # Embeddings
      EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"

      # FAISS
      FAISS_INDEX_DIR: "/app/shared/faiss_index"
      FAISS_INDEX_FILE: "index.faiss"
      FAISS_METADATA_FILE: "metadata.pkl"

      # Ollama
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "llama3.2:3b"
      OLLAMA_TIMEOUT: "120"

    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

    volumes:
      - ./services/processor/src:/app/
      - ./shared:/app/shared

    # 🆕 CAMBIO: Se ejecuta bajo demanda, no automáticamente
    profiles:
      - manual  # No se inicia con "docker compose up"
    
    command: ["python", "-m", "src.main"]

volumes:
  mysqldata:
  ollama_data:
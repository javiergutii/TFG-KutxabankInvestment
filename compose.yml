services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  extractor:
    build:
      context: ./services/extractor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db
    ports:
      - "8000:8000"
    environment:
      # MySQL
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass

      # Metadata / app config
      EMPRESA: "Tubacex"
      VIDEO_TITLE: "Conference demo"
      TARGET_URL: "https://edge.media-server.com/mmc/p/4phi6xni/"
      FECHA: "2026-02-03 10:00"

      # Configuración del processor
      CHUNK_SIZE: "200"
      CHUNK_OVERLAP: "100"
      EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
      FAISS_INDEX_DIR: "/app/shared/faiss_index"
      FAISS_INDEX_FILE: "index.faiss"
      FAISS_METADATA_FILE: "metadata.pkl"

      # Groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: "moonshotai/kimi-k2-instruct"
      GROQ_MAX_TOKENS: "2000"

      # Proxy
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,db,frontend"

      # Azure AD — para validar tokens del frontend
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}

      # SharePoint
      SHAREPOINT_ENABLED: ${SHAREPOINT_ENABLED:-false}
      SHAREPOINT_TENANT_ID: ${SHAREPOINT_TENANT_ID:-}
      SHAREPOINT_CLIENT_ID: ${SHAREPOINT_CLIENT_ID:-}
      SHAREPOINT_SITE_ID: ${SHAREPOINT_SITE_ID:-}
      SHAREPOINT_FOLDER: ${SHAREPOINT_FOLDER:-Transcripciones}

    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/extractor/src:/app/src
      - ./data:/data
      - ./artifacts:/app/artifacts
      - ./outputs:/app/outputs
      - ./shared:/app/shared
      - ./exports:/app/exports
    # 🆕 Ahora arranca como API REST en lugar de script standalone
    command: ["python", "-m", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]

  # 🆕 Frontend React
  frontend:
    build:
      context: ./services/frontend
    ports:
      - "3000:3000"
    environment:
      VITE_AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-TU_CLIENT_ID}
      VITE_AZURE_TENANT_ID: ${AZURE_TENANT_ID:-TU_TENANT_ID}
      VITE_API_URL: http://localhost:8000
      VITE_REDIRECT_URI: http://localhost:3000
    depends_on:
      - extractor

  processor:
    build:
      context: ./services/processor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db
    environment:
      # Proxy
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,db"
      # MySQL
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass
      # Procesamiento
      BATCH_SIZE: "10"
      CHUNK_SIZE: "200"
      CHUNK_OVERLAP: "100"
      PROCESSING_INTERVAL: "30"
      # Embeddings
      EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
      # FAISS
      FAISS_INDEX_DIR: "/app/shared/faiss_index"
      FAISS_INDEX_FILE: "index.faiss"
      FAISS_METADATA_FILE: "metadata.pkl"
      # Groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: "moonshotai/kimi-k2-instruct"
      GROQ_MAX_TOKENS: "2000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/processor/src:/app/
      - ./shared:/app/shared
      - ./exports:/app/exports
    restart: unless-stopped
    command: ["python", "-u", "main.py"]

volumes:
  mysqldata:
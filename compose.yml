services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  extractor:
    build:
      context: ./services/extractor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db

    environment:
      # MySQL
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass

      # Metadata / app config
      COMPANY_NAME: "empresa A"
      VIDEO_TITLE: "Conference demo"
      VIDEO_URL: ""              # si lo usas, pon la URL aquí
      VIDEO_DATE: "2026-02-03 10:00"

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./services/extractor/src:/app/src
      - ./data:/data
      - ./artifacts:/app/artifacts
      - ./artifacts:/app

    command: ["python", "-m", "src.main"]

  processor:
    build:
      context: ./services/processor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db

    environment:
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass

      # (Opcional) TZ: "Europe/Madrid"

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./services/processor/src:/app/src
      - ./shared:/app/shared

    command: ["python", "-m", "src.main"]

volumes:
  mysqldata:

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
    healthcheck:
      test: ["CMD-SHELL", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  extractor:
    build:
      context: ./services/extractor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db
    environment:
      # MySQL
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass
      # Metadata / app config
      COMPANY_NAME: "empresa A"
      VIDEO_TITLE: "Conference demo"
      VIDEO_URL: ""
      VIDEO_DATE: "2026-02-03 10:00"
      
      # Configuración del processor
      CHUNK_SIZE: "200"
      CHUNK_OVERLAP: "100"
      EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
      FAISS_INDEX_DIR: "/app/shared/faiss_index"
      FAISS_INDEX_FILE: "index.faiss"
      FAISS_METADATA_FILE: "metadata.pkl"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "qwen2.5:14b"
      OLLAMA_TIMEOUT: "3600"

      HTTP_PROXY: ""           # ← Deshabilitar proxy en runtime
      HTTPS_PROXY: ""          # ← Deshabilitar proxy en runtime
      NO_PROXY: "localhost,127.0.0.1,db,ollama"  # ← Añadir esto
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./services/extractor/src:/app/src
      - ./data:/data
      - ./artifacts:/app/artifacts
      - ./outputs:/app/outputs
      - ./services/processor:/app/processor_code:ro
      - ./shared:/app/shared
      - ./exports:/app/exports
    profiles:
      - manual
    command: ["python", "-m", "main"]

  processor:
    build:
      context: ./services/processor
      args:
        HTTP_PROXY: http://proxy.norbolsa.es:8080
        HTTPS_PROXY: http://proxy.norbolsa.es:8080
        NO_PROXY: localhost,127.0.0.1,::1,db,ollama
    environment:
      # Proxy (deshabilitar en runtime para servicios internos)
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,db,ollama"
      
      # MySQL
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: reports
      MYSQL_USER: reports_user
      MYSQL_PASSWORD: reports_pass
      
      # Procesamiento
      BATCH_SIZE: "10"
      CHUNK_SIZE: "200"
      CHUNK_OVERLAP: "100"
      
      # Embeddings
      EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
      
      # FAISS
      FAISS_INDEX_DIR: "/app/shared/faiss_index"
      FAISS_INDEX_FILE: "index.faiss"
      FAISS_METADATA_FILE: "metadata.pkl"
      
      # Ollama
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "qwen2.5:14b"
      OLLAMA_TIMEOUT: "3600"
      OLLAMA_MAX_TOKENS: "1200"
    
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./services/processor/src:/app/
      - ./shared:/app/shared
      - ./exports:/app/exports
    profiles:
      - manual
    command: ["python", "main.py"]

volumes:
  mysqldata:
  ollama_data: